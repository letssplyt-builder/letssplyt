# Staging EAS builds are manual — they consume Expo monthly build quota.
# Run from GitHub: Actions → "EAS Staging Build" → Run workflow.
# Or locally: cd mobile && eas build --profile staging --platform android
name: EAS Staging Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  eas-staging-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build staging app
        run: |
          cd mobile
          eas build --profile staging --platform ${{ inputs.platform }} --non-interactive
